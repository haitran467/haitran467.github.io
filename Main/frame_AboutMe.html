<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Footer Đơn Giản</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        box-sizing: border-box;
    }

    .footer-simple {
        padding: 25px 0; 
        width: 100%;
        margin: 0;
        
        background: url('../images/banner.gif') repeat;
        background-size: auto;
        
        color: #ffffff; 
        font-family: Arial, sans-serif;
        font-size: 14px;
        text-align: center;
        
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9), 0 0 6px rgba(46, 204, 113, 0.6);
        
        box-sizing: border-box; 
    }

    .footer-simple strong {
        color: #2ecc71; 
        font-weight: bold;
        letter-spacing: 0.5px;
    }

    .footer-school {
        margin-left: 10px;
        padding-left: 10px;
        border-left: 1px solid rgba(255, 255, 255, 0.3);
        font-weight: 500;
    }

    @media (max-width: 600px) {
        .footer-school {
            display: block;
            border-left: none;
            margin-left: 0;
            padding-left: 0;
            margin-top: 8px;
        }
    }
</style>
</head>

<body>
    
    <footer class="footer-simple">
        Designed by <strong>Trần Văn Duy Hải</strong>
        <span class="footer-school">TRƯỜNG CAO ĐẲNG CÔNG NGHỆ CAO ĐỒNG NAI</span>
    </footer>

</body>
</html>
