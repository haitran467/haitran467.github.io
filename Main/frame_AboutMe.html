<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Footer Đơn Giản</title>
<style>
    /* Phần CSS tối giản cho Footer */
    .footer-simple {
        padding: 20px 0;
        border-top: 1px solid #e1e2e4; /* Đường kẻ mờ ngăn cách */
        color: #6c757d; /* Màu chữ xám nhẹ chuyên nghiệp */
        font-family: Arial, sans-serif;
        font-size: 14px;
        text-align: center;
    }

    .footer-simple strong {
        color: #343a40; /* Tên bôi đậm màu tối hơn để nổi bật */
    }

    .footer-school {
        margin-left: 10px;
        padding-left: 10px;
        border-left: 1px solid #dee2e6; /* Gạch đứng phân cách nhẹ */
    }

    /* Đảm bảo hiển thị tốt trên điện thoại */
    @media (max-width: 600px) {
        .footer-school {
            display: block;
            border-left: none;
            margin-left: 0;
            padding-left: 0;
            margin-top: 5px;
        }
    }
</style>
</head>

<body>
	
    <footer class="footer-simple">
        Designed by <strong>Trần Văn Duy Hải</strong>
        <span class="footer-school">TRƯỜNG CAO ĐẲNG CÔNG NGHỆ CAO ĐỒNG NAI</span>
    </footer>

</body>
</html>
