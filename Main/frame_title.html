<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base target="frame_Main">
    <title>Header</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('../images/banner.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 150px;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 1;
        }

        .header-container {
            position: relative;
            z-index: 2;
            display: flex;
            width: 100%;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .logo-section a {
            display: block;
        }

        .logo-hakari {
            height: auto;
            max-height: 110px;
            width: 220px;
            object-fit: contain;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        
        .logo-hakari:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .title-section {
            flex: 1;
            text-align: center;
            overflow: hidden;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding-top: 10px;
        }

        .shimmer-text {
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            display: block;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8), 0 0 20px #ff0000;
            animation: slide-glow 3s infinite alternate ease-in-out;
        }

        .name { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #FFD700; 
            margin-bottom: 5px; 
        }
        
        .class-code { 
            font-size: 1.3rem; 
            color: #ffffff; 
        }

        @keyframes slide-glow {
            from { transform: translateX(-15px); }
            to { transform: translateX(15px); }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    
    <div class="header-container">
        <div class="logo-section">
            <a href="../../index.html" target="_top">
                <img src="../images/hakari.gif" alt="Logo" class="logo-hakari">
            </a>
        </div>

        <div class="title-section">
            <div class="shimmer-text name">Trần Văn Duy Hải</div>
            <div class="shimmer-text class-code">LỚP: CN24CD</div>
        </div>
    </div>
</body>
</html>
