<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Liên Hệ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #2563eb; /* Xanh dương chuyên nghiệp */
            --text-main: #1e293b;
            --text-sub: #64748b;
            --bg-body: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .contact-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-5px);
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-style: italic;
            margin-bottom: 30px;
        }

        .divider {
            height: 2px;
            width: 50px;
            background: var(--primary-color);
            margin: 20px auto;
        }

        .info-list {
            text-align: left;
            margin-top: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 15px;
            background: #f8fafc;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.2s;
        }

        .info-item:hover {
            background: #eff6ff;
            color: var(--primary-color);
        }

        .info-item i {
            width: 30px;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-right: 15px;
        }

        .school-name {
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
            display: block;
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .contact-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="profile-icon">
            <i class="fa-solid fa-user-tie"></i>
        </div>
        
        <h1>Thông tin liên hệ</h1>
        <p class="subtitle">Mọi chi tiết xin vui lòng liên hệ</p>
        
        <div class="divider"></div>

        <div class="info-list">
            <span class="info-item">
                <i class="fa-solid fa-signature"></i>
                <strong>Trần Văn Duy Hải</strong>
            </span>

            <span class="info-item">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>Trường Cao đẳng Công nghệ cao Đồng Nai</span>
            </span>

            <a href="tel:0339947891" class="info-item">
                <i class="fa-solid fa-phone-volume"></i>
                <span>0339 947 891</span>
            </a>

            <a href="mailto:haydatran2006@gmail.com" class="info-item">
                <i class="fa-solid fa-envelope-open-text"></i>
                <span>haydatran2006@gmail.com</span>
            </a>
        </div>
    </div>

</body>
</html>
