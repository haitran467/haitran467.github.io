<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Kết Quả Học Tập</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        table {
            width: 600px;
            border-collapse: collapse; 
            background-color: white;
            border: 1px solid #000;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }

        .header-row, .footer-row {
            background-color: #00FF00; 
            color: #000;
        }

        .text-left {
            text-align: left;
        }

        .text-right {
            text-align: right;
            padding-right: 20px;
        }
    </style>
</head>
<body>

<table>
    <caption>KẾT QUẢ HỌC TẬP</caption>
    <thead>
        <tr class="header-row">
            <th rowspan="2">Họ Và tên<br>Học Sinh</th>
            <th colspan="2">Năm Sinh</th>
            <th rowspan="2">Điểm<br>TB</th>
            <th rowspan="2">Xếp Loại</th>
        </tr>
        <tr class="header-row">
            <th>Nam</th>
            <th>Nữ</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="text-left">Lê Thanh Xuân</td>
            <td></td>
            <td>1950</td>
            <td>8.5</td>
            <td>Giỏi</td>
        </tr>
        <tr>
            <td class="text-left">Phan Thế Hạ</td>
            <td>1985</td>
            <td></td>
            <td>6.5</td>
            <td>Khá</td>
        </tr>
        <tr>
            <td class="text-left">Trần Hoài Thu</td>
            <td></td>
            <td>1986</td>
            <td>9.5</td>
            <td>Xuất Sắc</td>
        </tr>
        <tr>
            <td class="text-left">Trương Lưu Đông</td>
            <td>1984</td>
            <td></td>
            <td>6.0</td>
            <td>Trung Bình</td>
        </tr>
        <tr>
            <td class="text-left">Lưu Thế Mạc</td>
            <td>1985</td>
            <td></td>
            <td>4.5</td>
            <td>Kém</td>
        </tr>
    </tbody>
    <tfoot>
        <tr class="footer-row">
            <td colspan="4">Tổng số học sinh đạt:</td>
            <td class="text-right">4 Học sinh</td>
        </tr>
    </tfoot>
</table>

</body>
</html>
