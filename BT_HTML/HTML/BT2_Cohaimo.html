<body>
	<h3>CÔ HÁI MƠ</h3>
	Thơ thẩn đường chiều một khách thơ,
	<br>
	Say nhìn xa rặng núi núi xanh lơ,
	<br>
	Khí trời lặng lẽ và trong trẻo,
	<br>
	Thấp thoáng rừng mơ, <b><i>Cô hái mơ.</i></b>
	<br>
	<u>Tác giả</u> :<strike> <i>Vô Danh</i></strike>
