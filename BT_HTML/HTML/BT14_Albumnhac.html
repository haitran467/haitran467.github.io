<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Album Nhạc Online</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .marquee-container {
            width: 100%;
            background: #1DB954;
            padding: 10px 0;
            position: fixed;
            top: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        marquee {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000;
        }

        .music-card {
            background: #1e1e1e;
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            color: #fff;
            border-bottom: 2px solid #1DB954;
            padding-bottom: 10px;
            display: inline-block;
        }

        .playlist {
            list-style: none;
            padding: 0;
        }

        .playlist li {
            margin: 15px 0;
            transition: 0.3s;
        }

        .playlist a {
            display: block;
            padding: 15px;
            background: #282828;
            color: #1DB954;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .playlist a:hover {
            background: #333;
            color: #fff;
            border-color: #1DB954;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <marquee scrollamount="10">🔥 Chào mừng bạn đến với không gian nhạc Online🔥</marquee>
    </div>

    <div class="music-card">
        <h2>DANH SÁCH NHẠC</h2>
        
        <ul class="playlist">
            <li>
                <a href="../HTML/BT11_Nhacnen.html" target="_self">Vẽ - Trúc Nhân</a>
            </li>
            
            <li>
                <a href="../Scripts/Nhacnen2.html" target="_self">Không phải dạng vừa đâu - Sơn Tùng MTP</a>
            </li>
            
            <li>
                <a href="../Scripts/Nhacnen3.html" target="_self">Khuôn mặt đáng thương - Sơn Tùng MTP</a>
            </li>
        </ul>

        <div class="footer">Chọn một bài hát để bắt đầu trải nghiệm</div>
    </div>

</body>
</html>
