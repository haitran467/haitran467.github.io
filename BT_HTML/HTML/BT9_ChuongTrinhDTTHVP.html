<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chương trình DTTHVP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #00FFFF; 
        }

        .content-box {
            text-align: left;
            width: fit-content;
        }

        .header-title {
            color: #0000FF;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 20px;
            display: block;
        }

        .category-title {
            color: #FF0000;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            display: block;
        }

        .course-list {
            list-style-type: none;
            padding-left: 25px;
            margin: 5px 0;
            color: #0000FF;
        }

        .course-list li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="content-box">
        <span class="header-title">CHƯƠNG TRÌNH ĐÀO TẠO</span>

        <span class="category-title">TIN HỌC VĂN PHÒNG</span>
        <ul class="course-list">
            <li>Tin học căn bản & WindowsXP</li>
            <li>Soạn thảo văn bản Microsoft Word 2003</li>
            <li>Xử lý bảng tính Microsoft Excel 2003</li>
        </ul>

        <span class="category-title">TIN HỌC QUẢN LÝ</span>
        <ul class="course-list">
            <li>Lập trình CSDL Microsoft Access 2003</li>
            <li>Thiết kế trình chiếu Microsoft PowerPoint 2003</li>
        </ul>
    </div>

</body>
</html>
